<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Autochthon</title>
  <link rel="stylesheet" href="{{ static_url("css/view.css") }}">
  <script src="{{ static_url("js/pixi.min.js") }}" type="text/javascript"></script>
</head>
<body>
<div id="gameContainer">
  <div id="render"></div>
  <div id="gameLogContainer"><div id="gameLog"></div></div>
</div>
<div id="gameModal" class="modal">
  <div id="gameModalContent" class="modal-content">
    <div id="gameModalHeader" class="modal-header"></div>
    <div id="gameModalInnerContent" class="modal-inner-content"></div>
    <div id="gameModalFooter" class="modal-footer"></div>
    <div id="gameModalStatus" class="modal-status"></div>
  </div>
</div>
<div id="gameSubModal" class="sub-modal">
  <div id="gameSubModalContent" class="sub-modal-content">
    <div id="gameSubModalHeader" class="sub-modal-header"></div>
    <div id="gameSubModalInnerContent" class="sub-modal-inner-content"></div>
    <div id="gameSubModalFooter" class="sub-modal-footer"></div>
    <div id="gameSubModalStatus" class="sub-modal-status"></div>
  </div>
</div>
<script src="{{ static_url("js/view.js") }}" type="text/javascript"></script>
</body>
</html>
