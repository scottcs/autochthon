name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The game's runtime deps (tcod, bearlibterminal, PySide2) are 2019-2022
      # versions that do not install on current Python, so CI installs only the
      # test and check tooling. The checks below are scoped to the
      # standard-library random.py module and the test suite accordingly.
      # Versions are unpinned here; pin them if you want fully reproducible runs.
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest mypy black isort \
            flake8 flake8-docstrings flake8-bugbear flake8-builtins flake8-comprehensions

      - name: Format (black)
        run: black --check -l 99 test/

      - name: Import order (isort)
        run: isort --check test/

      - name: Lint (flake8)
        run: flake8 test/

      - name: Type check (mypy, strict via setup.cfg)
        run: mypy game/utils/random.py test/

      - name: Tests (pytest)
        run: pytest test/ -q
